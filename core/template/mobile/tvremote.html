<script>
    (function () {
        const eqLogicId = '#id#';
        const widget = document.querySelector('.eqLogic-widget[data-eqLogic_id="' + eqLogicId + '"]');

        if (!widget) {
            console.error('TVRemote: Widget not found for eqLogic', eqLogicId);
            return;
        }

        console.log('TVRemote: Initializing mobile widget', eqLogicId);

        // Setup click handlers for all buttons with data-cmd_id
        function setupClickHandlers() {
            // Handle app buttons
            widget.querySelectorAll('.app-btn[data-cmd_id]').forEach(function (btn) {
                const cmdId = btn.getAttribute('data-cmd_id');
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    executeCmd(cmdId, this);
                });
            });

            // Handle action buttons - need to load cmd map first
            jeedom.eqLogic.byId({
                id: eqLogicId,
                error: function (error) {
                    console.error('TVRemote: Error loading equipment:', error);
                },
                success: function (data) {
                    if (data && data.cmds) {
                        const cmdMap = {};
                        data.cmds.forEach(function (cmd) {
                            cmdMap[cmd.logicalId] = cmd;
                        });

                        console.log('TVRemote: Command map:', cmdMap);

                        // Setup handlers for action buttons (navigation, volume, etc.)
                        widget.querySelectorAll('[data-action]').forEach(function (btn) {
                            const logicalId = btn.getAttribute('data-action');
                            const cmd = cmdMap[logicalId];
                            console.log('TVRemote: Button', logicalId, 'mapped to cmd:', cmd);
                            if (cmd && cmd.id) {
                                btn.addEventListener('click', function (e) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    console.log('TVRemote: Button clicked, executing cmd', cmd.id);
                                    executeCmd(cmd.id, this);
                                });
                            } else {
                                console.warn('TVRemote: No command found for action:', logicalId);
                            }
                        });
                    }
                }
            });
        }

        // Execute command with visual feedback
        function executeCmd(cmdId, btnElement) {
            if (btnElement) {
                btnElement.style.opacity = '0.6';
                setTimeout(function () {
                    btnElement.style.opacity = '1';
                }, 200);
            }

            console.log('TVRemote: Executing command', cmdId);
            jeedom.cmd.execute({
                id: cmdId,
                error: function (error) {
                    console.error('TVRemote: Error executing command:', error);
                },
                success: function () {
                    console.log('TVRemote: Command executed successfully');
                }
            });
        }

        // Update binary status icons based on cmdValue
        function updateBinaryStatus(cmdId) {
            const icon = widget.querySelector('.status-icon.cmd[data-cmd_id="' + cmdId + '"]');
            if (icon && icon.dataset.subtype === 'binary') {
                const valueSpan = icon.querySelector('.cmdValue');
                if (valueSpan) {
                    const value = valueSpan.textContent.trim();
                    icon.setAttribute('data-cmd_value', value);
                }
            }
        }

        // Initialize status updates using Jeedom standard event system
        function initStatusUpdates() {
            // Initial update for all binary commands
            widget.querySelectorAll('.status-icon.cmd[data-subtype="binary"]').forEach(function(icon) {
                const cmdId = icon.getAttribute('data-cmd_id');
                if (cmdId) {
                    updateBinaryStatus(cmdId);
                }
            });

            // Listen to Jeedom standard update events
            widget.addEventListener('jeedom::cmd::update', function(event) {
                if (event.detail && event.detail.cmd_id) {
                    updateBinaryStatus(event.detail.cmd_id);
                }
            });
        }

        // Initialize
        setupClickHandlers();
        initStatusUpdates();
    })();
</script>
</div>
