<link rel="stylesheet" type="text/css" href="plugins/tvremote/core/template/dashboard/tvremote.css">

<div class="tvremote-widget eqLogic eqLogic-widget allowResize #custom_layout# #eqLogic_class# #class# #category#"
    data-eqType="#eqType#" data-eqLogic_id="#id#" data-eqLogic_uid="#uid#" data-version="dashboard"
    data-translate-category="#translate_category#" data-category="#category#" data-tags="#tags#"
    style="width: #width#;height: #height#;#style#">

    <!-- Widget name with refresh button -->
    <div class="widget-name">
        <span class="reportModeVisible">#name_display# <span class="object_name">#object_name#</span></span>
        <a href="#eqLink#" class="reportModeHidden">#name_display# <span class="object_name">#object_name#</span></a>
        <span class="cmd refresh cursor" title="Rafraîchir" data-cmd_id="#refresh_id#"
            style="position: absolute; right: 5px; top: 5px;">
            <i class="fas fa-sync"></i>
        </span>
    </div>

    <div class="tvremote-content">
        <div class="tvremote-status-row">
            <div class="status-item">
                <div class="status-icon cmd" data-type="info" data-subtype="binary" data-cmd_id="#online_id#"
                    data-cmd_value="#online_value#">
                    <i class="fas fa-signal"></i>
                </div>
                <span class="status-label">En Ligne</span>
            </div>

            <div class="status-item">
                <div class="status-icon cmd" data-type="info" data-subtype="binary" data-cmd_id="#adb_connected_id#"
                    data-cmd_value="#adb_connected_value#">
                    <i class="fas fa-plug"></i>
                </div>
                <span class="status-label">ADB</span>
            </div>

            <div class="status-item">
                <div class="status-icon cmd" data-type="info" data-subtype="binary" data-cmd_id="#is_on_id#"
                    data-cmd_value="#is_on_value#">
                    <i class="fas fa-power-off"></i>
                </div>
                <span class="status-label">Power</span>
            </div>

            <div class="status-item">
                <div class="volume-indicator cmd" data-type="info" data-subtype="numeric"
                    data-cmd_id="#volume_level_id#">
                    <span class="cmdValue">#volume_level_value#</span>%
                </div>
                <span class="status-label">Volume</span>
            </div>

            <div class="status-item">
                <div class="status-icon cmd" data-type="info" data-subtype="binary" data-cmd_id="#volume_muted_id#"
                    data-cmd_value="#volume_muted_value#">
                    <i class="fas fa-volume-off"></i>
                </div>
                <span class="status-label">Mute</span>
            </div>
        </div>
    </div>

    <!-- Top control row -->
    <div class="control-section">
        <div class="control-row">
            <button class="remote-btn" data-action="menu" title="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <button class="remote-btn primary" data-action="volumedown" title="Volume -">
                <i class="fas fa-volume-down"></i>
            </button>
            <button class="remote-btn primary" data-action="volumeup" title="Volume +">
                <i class="fas fa-volume-up"></i>
            </button>
            <button class="remote-btn" data-action="tv" title="TV / Source">
                <i class="fas fa-tv"></i>
            </button>
        </div>
    </div>

    <!-- Navigation pad -->
    <div class="nav-section">
        <div class="nav-placeholder"></div>
        <button class="nav-btn" data-action="up" title="Haut">
            <i class="fas fa-chevron-up"></i>
        </button>
        <div class="nav-placeholder"></div>

        <button class="nav-btn" data-action="left" title="Gauche">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-btn center" data-action="center" title="OK / Valider">
            <i class="fas fa-check"></i>
        </button>
        <button class="nav-btn" data-action="right" title="Droite">
            <i class="fas fa-chevron-right"></i>
        </button>

        <div class="nav-placeholder"></div>
        <button class="nav-btn" data-action="down" title="Bas">
            <i class="fas fa-chevron-down"></i>
        </button>
        <div class="nav-placeholder"></div>
    </div>

    <!-- Action buttons -->
    <div class="control-section">
        <div class="control-row three-cols">
            <button class="remote-btn" data-action="back" title="Retour">
                <i class="fas fa-reply"></i>
            </button>
            <button class="remote-btn" data-action="home" title="Accueil">
                <i class="fas fa-home"></i>
            </button>
            <button class="remote-btn" data-action="settings" title="Paramètres">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </div>

    <!-- Number pad -->
    <div class="numpad-section">
        <button class="num-btn" data-action="one">1</button>
        <button class="num-btn" data-action="two">2</button>
        <button class="num-btn" data-action="three">3</button>

        <button class="num-btn" data-action="four">4</button>
        <button class="num-btn" data-action="five">5</button>
        <button class="num-btn" data-action="six">6</button>

        <button class="num-btn" data-action="seven">7</button>
        <button class="num-btn" data-action="eight">8</button>
        <button class="num-btn" data-action="nine">9</button>

        <button class="num-btn" data-action="channel_down">
            <i class="fas fa-minus"></i>
        </button>
        <button class="num-btn" data-action="zero">0</button>
        <button class="num-btn" data-action="channel_up">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- HDMI inputs -->
    <div class="hdmi-section">
        <button class="hdmi-btn" data-action="input" title="Changer de source">Input</button>
        <button class="hdmi-btn" data-action="hdmi_1" title="Entrée HDMI 1">HDMI 1</button>
        <button class="hdmi-btn" data-action="hdmi_2" title="Entrée HDMI 2">HDMI 2</button>
        <button class="hdmi-btn" data-action="hdmi_3" title="Entrée HDMI 3">HDMI 3</button>
    </div>

    <!-- Media controls -->
    <div class="media-section">
        <button class="media-btn" data-action="media_previous" title="Précédent">
            <i class="fas fa-step-backward"></i>
        </button>
        <button class="media-btn" data-action="media_rewind" title="Retour rapide">
            <i class="fas fa-backward"></i>
        </button>
        <button class="media-btn" data-action="media_play" title="Lecture">
            <i class="fas fa-play"></i>
        </button>
        <button class="media-btn" data-action="media_pause" title="Pause">
            <i class="fas fa-pause"></i>
        </button>
        <button class="media-btn" data-action="media_stop" title="Stop">
            <i class="fas fa-stop"></i>
        </button>
        <button class="media-btn" data-action="media_forward" title="Avance rapide">
            <i class="fas fa-forward"></i>
        </button>
        <button class="media-btn" data-action="media_next" title="Suivant">
            <i class="fas fa-step-forward"></i>
        </button>
    </div>

    <div class="section-divider"></div>

    <!-- Apps section -->
    <div class="apps-section" id="apps-section-#id#">
        #apps_html#
    </div>
</div>

<!-- Current app display -->
<div class="current-app-display">
    <span class="current-app-label">App actuelle: </span>
    <span class="current-app-value cmd" data-type="info" data-subtype="string" data-cmd_id="#current_app_id#">
        <span class="cmdValue">#current_app_value#</span>
    </span>
</div>

<script>
    (function () {
        const eqLogicId = '#id#';
        const widget = document.querySelector('.tvremote-widget[data-eqlogic_id="' + eqLogicId + '"]');

        if (!widget) {
            console.error('TVRemote: Widget not found for eqLogic', eqLogicId);
            return;
        }

        console.log('TVRemote: Initializing widget', eqLogicId);

        // Setup click handlers for all buttons with data-cmd_id
        function setupClickHandlers() {
            // Handle app buttons
            widget.querySelectorAll('.app-btn[data-cmd_id]').forEach(function (btn) {
                const cmdId = btn.getAttribute('data-cmd_id');
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    executeCmd(cmdId, this);
                });
            });

            // Handle action buttons - need to load cmd map first
            jeedom.eqLogic.byId({
                id: eqLogicId,
                error: function (error) {
                    console.error('TVRemote: Error loading equipment:', error);
                },
                success: function (data) {
                    if (data && data.cmds) {
                        const cmdMap = {};
                        data.cmds.forEach(function (cmd) {
                            cmdMap[cmd.logicalId] = cmd;
                        });

                        // Setup handlers for action buttons (navigation, volume, etc.)
                        widget.querySelectorAll('[data-action]').forEach(function (btn) {
                            const logicalId = btn.getAttribute('data-action');
                            const cmd = cmdMap[logicalId];
                            if (cmd && cmd.id) {
                                btn.addEventListener('click', function (e) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                    executeCmd(cmd.id, this);
                                });
                            }
                        });
                    }
                }
            });
        }

        // Execute command with visual feedback
        function executeCmd(cmdId, btnElement) {
            if (btnElement) {
                btnElement.style.opacity = '0.6';
                setTimeout(function () {
                    btnElement.style.opacity = '1';
                }, 200);
            }

            console.log('TVRemote: Executing command', cmdId);
            jeedom.cmd.execute({
                id: cmdId,
                error: function (error) {
                    console.error('TVRemote: Error executing command:', error);
                },
                success: function () {
                    console.log('TVRemote: Command executed successfully');
                }
            });
        }

        // Initialize
        setupClickHandlers();
    })();
</script>
</div>
